---
# Track 6 — Database Uniformization & Schema Health.
# Data-driven manifest for `netrisk-console database upgrade-schema --phase <n>`.
#
# Each phase maps to a target `db_version` (the highest numbered SQL file the phase
# introduces under DB/Structure + DB/Data) and declares the census queries captured
# before the phase and the post-apply validations that must pass afterwards.
#
# The numbered SQL files for a phase are added when that milestone (6.2–6.4) is built;
# the upgrade tool refuses to run a phase whose target SQL files are not present yet.
# Version 63 (the schema_upgrade_log table itself) is core 6.1 infrastructure applied
# via the normal `database update` path, so it is not listed as an upgrade phase here.

# Phase-6 removal candidates (zero references outside DAL/Migrations per the plan). The
# `database baseline` command runs a row-count census over these so a candidate with data
# (archive) is distinguished from an empty one (drop) before any deprecation work. Table
# names here are the live DB names. `RiskGrouping` is intentionally excluded (1 use in
# StatisticsService — investigate first).
removalCandidates:
  # functional tables (live snake_case DB names — these legacy SimpleRisk tables were already snake_case;
  # the `database baseline` census and Phase 6 RENAME/DROP both run against the real DB, so they must match
  # the actual table_name, not the PascalCase C# entity class).
  - contributing_risks_impact
  - contributing_risks_likelihood
  - questionnaire_pending_risks
  - residual_risk_scoring_history
  - framework_control_test_results_to_risks
  - framework_control_type_mappings
  - permission_to_permission_group
  - mitigation_accept_users
  - risk_to_additional_stakeholder
  - risk_to_location
  - risk_to_technology
  - framework_control_test_comments
  - framework_control_test_audits
  - failed_login_attempts
  - user_pass_history
  # enumeration tables
  - control_phase
  - control_type
  - file_type_extensions
  - regulation
  - risk_function
  - test_status
  - threat_catalog
  - threat_grouping

phases:
  - phase: "1"
    description: >-
      Phase 1 — safe fixes: rename typo indexes (biometic/sequencial/optinal) and remove the illegal
      0000-00-00 column defaults on mgmt_reviews.next_review and mitigations.last_update. (Boolean
      tinyint(1) normalization and broad collation unification are deferred: they require sbyte->bool
      C# type changes / a per-column survey, which exceed Phase 1's rename-only safety.)
    startVersion: 63
    targetVersion: 64
    census:
      - name: "zero-date-values"
        sql: >-
          SELECT 'mgmt_reviews.next_review' AS col, COUNT(*) AS bad FROM mgmt_reviews WHERE next_review = '0000-00-00'
          UNION ALL SELECT 'mitigations.last_update', COUNT(*) FROM mitigations WHERE last_update = '0000-00-00 00:00:00';
    validations:
      # Tables are renamed to snake_case in Phase 2, so Phase 1 validates against the current names.
      - type: "IndexExists"
        name: "biometric-id-index-renamed"
        table: "BiometricTransaction"
        target: "idx_biometric_transaction_id"
      - type: "IndexExists"
        name: "biometric-anchor-index-renamed"
        table: "BiometricTransaction"
        target: "idx_biometric_transaction_anchor"
      - type: "IndexExists"
        name: "irpt-sequential-index-renamed"
        table: "IncidentResponsePlanTasks"
        target: "idx_irpt_sequential"
      - type: "IndexExists"
        name: "irpt-optional-index-renamed"
        table: "IncidentResponsePlanTasks"
        target: "idx_irpt_optional"
      - type: "Custom"
        name: "mgmt_reviews-next_review-no-zero-default"
        sql: >-
          SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = DATABASE()
          AND table_name = 'mgmt_reviews' AND column_name = 'next_review'
          AND column_default = '0000-00-00';
        expected: "0"

  - phase: "2"
    description: >-
      Phase 2 — naming uniformization: rename the 8 PascalCase tables (Incidents,
      IncidentResponsePlan*, BiometricTransaction, FaceIDUsers, FixRequest) and the hybrid columns
      (vulnerabilities_to_actions.actionId/vulnerabilityId, reports.creationDate/creatorId/fileId,
      hosts.FQDN/OS, messages.Message) to snake_case. RENAME only — C# entities/DTOs unchanged.
    startVersion: 64
    targetVersion: 65
    census:
      - name: "pre-rename-rowcounts"
        sql: >-
          SELECT 'Incidents' AS tbl, COUNT(*) AS cnt FROM Incidents
          UNION ALL SELECT 'BiometricTransaction', COUNT(*) FROM BiometricTransaction
          UNION ALL SELECT 'FixRequest', COUNT(*) FROM FixRequest;
    validations:
      # The snake_case tables exist after the rename (and the old PascalCase names are gone).
      - type: "TableExists"
        name: "incidents-renamed"
        table: "incidents"
      - type: "TableExists"
        name: "incident_response_plans-renamed"
        table: "incident_response_plans"
      - type: "TableExists"
        name: "incident_response_plan_task_executions-renamed"
        table: "incident_response_plan_task_executions"
      - type: "TableExists"
        name: "biometric_transactions-renamed"
        table: "biometric_transactions"
      - type: "TableExists"
        name: "face_id_users-renamed"
        table: "face_id_users"
      - type: "TableExists"
        name: "fix_requests-renamed"
        table: "fix_requests"
      - type: "Custom"
        name: "old-pascalcase-incidents-gone"
        sql: >-
          SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = DATABASE()
          AND BINARY table_name = 'Incidents';
        expected: "0"
      - type: "Custom"
        name: "reports-created_at-column-exists"
        sql: >-
          SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = DATABASE()
          AND table_name = 'reports' AND column_name = 'created_at';
        expected: "1"

  - phase: "1b"
    description: >-
      Phase 1b — boolean width normalization (deferred from Phase 1): tinyint(4) -> tinyint(1) for the
      genuine booleans comments.IsAnonymous and framework_controls.deleted; the C# properties were
      changed sbyte -> bool (and the SecurityControlStatistic DTO field) to map cleanly.
    startVersion: 65
    targetVersion: 66
    validations:
      - type: "ColumnType"
        name: "framework_controls-deleted-tinyint1"
        table: "framework_controls"
        target: "deleted"
        expected: "tinyint"
      - type: "Custom"
        name: "framework_controls-deleted-is-tinyint1"
        sql: >-
          SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = DATABASE()
          AND table_name = 'framework_controls' AND column_name = 'deleted'
          AND column_type = 'tinyint(1)';
        expected: "1"
      - type: "Custom"
        name: "comments-isanonymous-is-tinyint1"
        sql: >-
          SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = DATABASE()
          AND table_name = 'comments' AND column_name = 'IsAnonymous'
          AND column_type = 'tinyint(1)';
        expected: "1"

  - phase: "2b"
    description: >-
      Phase 2b — snake_case the last stray PascalCase column: comments.IsAnonymous -> is_anonymous
      (the Phase 1 boolean fix kept the legacy column name; this completes its naming compliance).
    startVersion: 66
    targetVersion: 67
    validations:
      - type: "Custom"
        name: "comments-is_anonymous-exists"
        sql: >-
          SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = DATABASE()
          AND table_name = 'comments' AND column_name = 'is_anonymous';
        expected: "1"
      - type: "Custom"
        name: "comments-old-IsAnonymous-gone"
        sql: >-
          SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = DATABASE()
          AND table_name = 'comments' AND BINARY column_name = 'IsAnonymous';
        expected: "0"

  - phase: "1c"
    description: >-
      Phase 1c — collation/charset unification: convert every utf8mb3 (and utf8mb4_general_ci) table to
      utf8mb4 / utf8mb4_unicode_ci via ALTER TABLE ... CONVERT TO (table default + all char columns).
    startVersion: 67
    targetVersion: 68
    census:
      - name: "non-utf8mb4-tables"
        sql: >-
          SELECT table_name, table_collation FROM information_schema.tables
          WHERE table_schema = DATABASE() AND table_collation NOT LIKE 'utf8mb4%';
    validations:
      - type: "Custom"
        name: "no-utf8mb3-tables-remain"
        sql: >-
          SELECT COUNT(*) FROM information_schema.tables
          WHERE table_schema = DATABASE() AND table_collation LIKE 'utf8mb3%';
        expected: "0"
      - type: "Custom"
        name: "no-utf8mb3-columns-remain"
        sql: >-
          SELECT COUNT(*) FROM information_schema.columns
          WHERE table_schema = DATABASE() AND character_set_name = 'utf8mb3';
        expected: "0"

  - phase: "3"
    description: >-
      Phase 3 — relationships: promote correlation columns to navigable, indexed FKs to user(value).
      Dangling references are logged to schema_upgrade_orphans then NULLed BEFORE ADD CONSTRAINT;
      risks.owner/manager/submitted_by and framework_control_tests.tester become nullable (SET NULL);
      framework_controls.control_owner gains a FK; incidents gains reported_by_id (best-effort backfilled
      from the free-text reported_by by exact user.name match, text preserved for external reporters).
    startVersion: 68
    targetVersion: 69
    census:
      - name: "orphan-risk-owner"
        sql: >-
          SELECT r.id, r.owner FROM risks r LEFT JOIN user u ON r.owner = u.value
          WHERE r.owner IS NOT NULL AND u.value IS NULL;
      - name: "orphan-risk-manager"
        sql: >-
          SELECT r.id, r.manager FROM risks r LEFT JOIN user u ON r.manager = u.value
          WHERE r.manager IS NOT NULL AND u.value IS NULL;
      - name: "orphan-risk-submitted-by"
        sql: >-
          SELECT r.id, r.submitted_by FROM risks r LEFT JOIN user u ON r.submitted_by = u.value
          WHERE r.submitted_by IS NOT NULL AND u.value IS NULL;
      - name: "orphan-framework-control-owner"
        sql: >-
          SELECT fc.id, fc.control_owner FROM framework_controls fc LEFT JOIN user u ON fc.control_owner = u.value
          WHERE fc.control_owner IS NOT NULL AND u.value IS NULL;
      - name: "orphan-framework-control-test-tester"
        sql: >-
          SELECT fct.id, fct.tester FROM framework_control_tests fct LEFT JOIN user u ON fct.tester = u.value
          WHERE fct.tester IS NOT NULL AND u.value IS NULL;
      - name: "incident-reported-by-backfill-preview"
        sql: >-
          SELECT i.Id, i.ReportedBy, u.value AS matched_user FROM incidents i
          JOIN user u ON u.name = i.ReportedBy
          WHERE i.ReportedBy IS NOT NULL
          AND (SELECT COUNT(*) FROM user u2 WHERE u2.name = i.ReportedBy) = 1;
    validations:
      - type: "ForeignKeyExists"
        name: "risk-owner-fk"
        table: "risks"
        target: "fk_risks_owner"
      - type: "ForeignKeyExists"
        name: "risk-manager-fk"
        table: "risks"
        target: "fk_risks_manager"
      - type: "ForeignKeyExists"
        name: "risk-submitted-by-fk"
        table: "risks"
        target: "fk_risks_submitted_by"
      - type: "ForeignKeyExists"
        name: "framework-control-owner-fk"
        table: "framework_controls"
        target: "fk_framework_controls_control_owner"
      - type: "ForeignKeyExists"
        name: "framework-control-test-tester-fk"
        table: "framework_control_tests"
        target: "fk_framework_control_tests_tester"
      - type: "ForeignKeyExists"
        name: "incident-reported-by-fk"
        table: "incidents"
        target: "fk_incidents_reported_by"
      - type: "IndexExists"
        name: "incident-reported-by-id-indexed"
        table: "incidents"
        target: "IX_incidents_reported_by_id"
      - type: "Custom"
        name: "no-dangling-risk-owner-remains"
        sql: >-
          SELECT COUNT(*) FROM risks r LEFT JOIN user u ON r.owner = u.value
          WHERE r.owner IS NOT NULL AND u.value IS NULL;
        expected: "0"
      - type: "Custom"
        name: "orphan-report-table-present"
        sql: >-
          SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = DATABASE()
          AND table_name = 'schema_upgrade_orphans';
        expected: "1"

  - phase: "4"
    description: >-
      Phase 4 — indexing for performance + BLOB-to-text conversions. Adds Sieve-justified hot-path indexes
      (vulnerabilities first/last detection, hosts status + registration_date, risks status+submission_date
      composite, user email); drops the redundant UNIQUE id index on framework_control_tests; converts the
      text-bearing BLOB columns (user.email, frameworks.name/description, framework_controls.*, permissions.description)
      to varchar/TEXT in place (utf8mb4), enabling collation and indexing without data loss.
    startVersion: 69
    targetVersion: 70
    census:
      - name: "blob-columns-before-conversion"
        sql: >-
          SELECT table_name, column_name, data_type FROM information_schema.columns
          WHERE table_schema = DATABASE() AND data_type = 'blob'
          AND ((table_name='user' AND column_name='email')
            OR (table_name='permissions' AND column_name='description')
            OR (table_name='frameworks' AND column_name IN ('name','description'))
            OR (table_name='framework_controls' AND column_name IN ('long_name','description','supplemental_guidance')));
    validations:
      - type: "IndexExists"
        name: "vulnerabilities-first-detection-index"
        table: "vulnerabilities"
        target: "idx_vulnerabilities_first_detection"
      - type: "IndexExists"
        name: "vulnerabilities-last-detection-index"
        table: "vulnerabilities"
        target: "idx_vulnerabilities_last_detection"
      - type: "IndexExists"
        name: "hosts-status-index"
        table: "hosts"
        target: "idx_hosts_status"
      - type: "IndexExists"
        name: "hosts-registration-date-index"
        table: "hosts"
        target: "idx_hosts_registration_date"
      - type: "IndexExists"
        name: "risks-status-submission-date-index"
        table: "risks"
        target: "idx_risks_status_submission_date"
      - type: "IndexExists"
        name: "user-email-index"
        table: "user"
        target: "idx_user_email"
      - type: "Custom"
        name: "framework-control-tests-redundant-id-index-removed"
        sql: >-
          SELECT COUNT(*) FROM information_schema.statistics WHERE table_schema = DATABASE()
          AND table_name = 'framework_control_tests' AND index_name = 'id';
        expected: "0"
      - type: "Custom"
        name: "user-email-no-longer-blob"
        sql: >-
          SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = DATABASE()
          AND table_name = 'user' AND column_name = 'email' AND data_type = 'varchar';
        expected: "1"
      - type: "Custom"
        name: "no-text-bearing-blob-columns-remain"
        sql: >-
          SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = DATABASE() AND data_type = 'blob'
          AND ((table_name='user' AND column_name='email')
            OR (table_name='permissions' AND column_name='description')
            OR (table_name='frameworks' AND column_name IN ('name','description'))
            OR (table_name='framework_controls' AND column_name IN ('long_name','description','supplemental_guidance')));
        expected: "0"

  - phase: "5"
    description: "Phase 5 — temporal/status type standardization (create-copy-coexist for risks.status)."
    startVersion: 70
    targetVersion: 71
    census:
      - name: "risk-status-distribution"
        sql: "SELECT status, COUNT(*) AS cnt FROM risks GROUP BY status;"
    validations:
      - type: "ColumnType"
        name: "risks-status-id-int"
        table: "risks"
        target: "status_id"
        expected: "int"

  - phase: "6a"
    description: >-
      Phase 6a — deprecate the 23 dead tables (rename to zz_deprecated_*, unmap from EF). Reversible.
      Also unmaps (no DDL) the orphan columns risks.regulation / risks.project_id, dropped in 6b. The legacy
      risks.status text is NOT touched — it must coexist with the Phase 5 status_id for one release.
    startVersion: 71
    targetVersion: 72
    census:
      - name: "deprecation-candidate-rowcounts"
        sql: >-
          SELECT 'contributing_risks_impact' AS tbl, COUNT(*) AS cnt FROM contributing_risks_impact
          UNION ALL SELECT 'questionnaire_pending_risks', COUNT(*) FROM questionnaire_pending_risks
          UNION ALL SELECT 'failed_login_attempts', COUNT(*) FROM failed_login_attempts;
    validations:
      - type: "Custom"
        name: "deprecated-tables-prefixed"
        sql: >-
          SELECT COUNT(*) FROM information_schema.tables
          WHERE table_schema = DATABASE() AND table_name LIKE 'zz_deprecated_%';
        expected: ">=23"
      - type: "Custom"
        name: "old-failed_login_attempts-name-gone"
        sql: >-
          SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = DATABASE()
          AND table_name = 'failed_login_attempts';
        expected: "0"
      - type: "Custom"
        name: "risks-status_id-coexists-with-status"
        sql: >-
          SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = DATABASE()
          AND table_name = 'risks' AND column_name IN ('status', 'status_id');
        expected: "2"

  - phase: "6b"
    description: >-
      Phase 6b — drop the deprecated tables after observation, then drop the orphan columns
      risks.regulation / risks.project_id. DESTRUCTIVE; the tool's automatic backup is the recovery dump.
    startVersion: 72
    targetVersion: 73
    destructive: true
    requiresPhase: "6a"
    observationDays: 30
    census:
      - name: "deprecated-table-rowcounts-before-drop"
        sql: >-
          SELECT table_name, table_rows FROM information_schema.tables
          WHERE table_schema = DATABASE() AND table_name LIKE 'zz_deprecated_%';
    validations:
      - type: "Custom"
        name: "deprecated-tables-removed"
        sql: >-
          SELECT COUNT(*) FROM information_schema.tables
          WHERE table_schema = DATABASE() AND table_name LIKE 'zz_deprecated_%';
        expected: "0"
      - type: "Custom"
        name: "risks-orphan-columns-dropped"
        sql: >-
          SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = DATABASE()
          AND table_name = 'risks' AND column_name IN ('regulation', 'project_id');
        expected: "0"

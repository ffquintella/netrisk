---
# Track 6 — Database Uniformization & Schema Health.
# Data-driven manifest for `netrisk-console database upgrade-schema --phase <n>`.
#
# Each phase maps to a target `db_version` (the highest numbered SQL file the phase
# introduces under DB/Structure + DB/Data) and declares the census queries captured
# before the phase and the post-apply validations that must pass afterwards.
#
# The numbered SQL files for a phase are added when that milestone (6.2–6.4) is built;
# the upgrade tool refuses to run a phase whose target SQL files are not present yet.
# Version 63 (the schema_upgrade_log table itself) is core 6.1 infrastructure applied
# via the normal `database update` path, so it is not listed as an upgrade phase here.

# Phase-6 removal candidates (zero references outside DAL/Migrations per the plan). The
# `database baseline` command runs a row-count census over these so a candidate with data
# (archive) is distinguished from an empty one (drop) before any deprecation work. Table
# names here are the live DB names. `RiskGrouping` is intentionally excluded (1 use in
# StatisticsService — investigate first).
removalCandidates:
  # functional tables
  - ContributingRisksImpact
  - ContributingRisksLikelihood
  - QuestionnairePendingRisk
  - ResidualRiskScoringHistory
  - FrameworkControlTestResultsToRisk
  - FrameworkControlTypeMapping
  - PermissionToPermissionGroup
  - MitigationAcceptUser
  - RiskToAdditionalStakeholder
  - RiskToLocation
  - RiskToTechnology
  - FrameworkControlTestComment
  - FrameworkControlTestAudit
  - FailedLoginAttempt
  - UserPassHistory
  # enumeration tables
  - ControlPhase
  - ControlType
  - FileTypeExtension
  - Regulation
  - RiskFunction
  - TestStatus
  - ThreatCatalog
  - ThreatGrouping

phases:
  - phase: "1"
    description: >-
      Phase 1 — safe fixes: rename typo indexes (biometic/sequencial/optinal) and remove the illegal
      0000-00-00 column defaults on mgmt_reviews.next_review and mitigations.last_update. (Boolean
      tinyint(1) normalization and broad collation unification are deferred: they require sbyte->bool
      C# type changes / a per-column survey, which exceed Phase 1's rename-only safety.)
    startVersion: 63
    targetVersion: 64
    census:
      - name: "zero-date-values"
        sql: >-
          SELECT 'mgmt_reviews.next_review' AS col, COUNT(*) AS bad FROM mgmt_reviews WHERE next_review = '0000-00-00'
          UNION ALL SELECT 'mitigations.last_update', COUNT(*) FROM mitigations WHERE last_update = '0000-00-00 00:00:00';
    validations:
      # Tables are renamed to snake_case in Phase 2, so Phase 1 validates against the current names.
      - type: "IndexExists"
        name: "biometric-id-index-renamed"
        table: "BiometricTransaction"
        target: "idx_biometric_transaction_id"
      - type: "IndexExists"
        name: "biometric-anchor-index-renamed"
        table: "BiometricTransaction"
        target: "idx_biometric_transaction_anchor"
      - type: "IndexExists"
        name: "irpt-sequential-index-renamed"
        table: "IncidentResponsePlanTasks"
        target: "idx_irpt_sequential"
      - type: "IndexExists"
        name: "irpt-optional-index-renamed"
        table: "IncidentResponsePlanTasks"
        target: "idx_irpt_optional"
      - type: "Custom"
        name: "mgmt_reviews-next_review-no-zero-default"
        sql: >-
          SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = DATABASE()
          AND table_name = 'mgmt_reviews' AND column_name = 'next_review'
          AND column_default = '0000-00-00';
        expected: "0"

  - phase: "2"
    description: >-
      Phase 2 — naming uniformization: rename the 8 PascalCase tables (Incidents,
      IncidentResponsePlan*, BiometricTransaction, FaceIDUsers, FixRequest) and the hybrid columns
      (vulnerabilities_to_actions.actionId/vulnerabilityId, reports.creationDate/creatorId/fileId,
      hosts.FQDN/OS, messages.Message) to snake_case. RENAME only — C# entities/DTOs unchanged.
    startVersion: 64
    targetVersion: 65
    census:
      - name: "pre-rename-rowcounts"
        sql: >-
          SELECT 'Incidents' AS tbl, COUNT(*) AS cnt FROM Incidents
          UNION ALL SELECT 'BiometricTransaction', COUNT(*) FROM BiometricTransaction
          UNION ALL SELECT 'FixRequest', COUNT(*) FROM FixRequest;
    validations:
      # The snake_case tables exist after the rename (and the old PascalCase names are gone).
      - type: "TableExists"
        name: "incidents-renamed"
        table: "incidents"
      - type: "TableExists"
        name: "incident_response_plans-renamed"
        table: "incident_response_plans"
      - type: "TableExists"
        name: "incident_response_plan_task_executions-renamed"
        table: "incident_response_plan_task_executions"
      - type: "TableExists"
        name: "biometric_transactions-renamed"
        table: "biometric_transactions"
      - type: "TableExists"
        name: "face_id_users-renamed"
        table: "face_id_users"
      - type: "TableExists"
        name: "fix_requests-renamed"
        table: "fix_requests"
      - type: "Custom"
        name: "old-pascalcase-incidents-gone"
        sql: >-
          SELECT COUNT(*) FROM information_schema.tables WHERE table_schema = DATABASE()
          AND BINARY table_name = 'Incidents';
        expected: "0"
      - type: "Custom"
        name: "reports-created_at-column-exists"
        sql: >-
          SELECT COUNT(*) FROM information_schema.columns WHERE table_schema = DATABASE()
          AND table_name = 'reports' AND column_name = 'created_at';
        expected: "1"

  - phase: "3"
    description: "Phase 3 — relationships: orphan cleanup + FK constraints + EF navigations."
    startVersion: 65
    targetVersion: 66
    census:
      - name: "orphan-risk-owner"
        sql: >-
          SELECT r.id, r.owner FROM risks r LEFT JOIN user u ON r.owner = u.value
          WHERE r.owner IS NOT NULL AND u.value IS NULL;
    validations:
      - type: "ForeignKeyExists"
        name: "risk-owner-fk"
        table: "risks"
        target: "fk_risks_owner"

  - phase: "4"
    description: "Phase 4 — indexing for performance + BLOB-to-text conversions."
    startVersion: 66
    targetVersion: 67
    validations:
      - type: "IndexExists"
        name: "vulnerabilities-status-index"
        table: "vulnerabilities"
        target: "idx_vulnerabilities_status"

  - phase: "5"
    description: "Phase 5 — temporal/status type standardization (create-copy-coexist for risks.status)."
    startVersion: 67
    targetVersion: 68
    census:
      - name: "risk-status-distribution"
        sql: "SELECT status, COUNT(*) AS cnt FROM risks GROUP BY status;"
    validations:
      - type: "ColumnType"
        name: "risks-status-id-int"
        table: "risks"
        target: "status_id"
        expected: "int"

  - phase: "6a"
    description: "Phase 6a — deprecate dead tables (rename to zz_deprecated_*, unmap from EF). Reversible."
    startVersion: 68
    targetVersion: 69
    census:
      - name: "deprecation-candidate-rowcounts"
        sql: >-
          SELECT 'ContributingRisksImpact' AS tbl, COUNT(*) AS cnt FROM ContributingRisksImpact
          UNION ALL SELECT 'QuestionnairePendingRisk', COUNT(*) FROM QuestionnairePendingRisk;
    validations:
      - type: "Custom"
        name: "deprecated-tables-prefixed"
        sql: >-
          SELECT COUNT(*) FROM information_schema.tables
          WHERE table_schema = DATABASE() AND table_name LIKE 'zz_deprecated_%';
        expected: ">0"

  - phase: "6b"
    description: "Phase 6b — drop deprecated tables after observation. DESTRUCTIVE; dumps each table first."
    startVersion: 69
    targetVersion: 70
    destructive: true
    requiresPhase: "6a"
    observationDays: 30
    validations:
      - type: "Custom"
        name: "deprecated-tables-removed"
        sql: >-
          SELECT COUNT(*) FROM information_schema.tables
          WHERE table_schema = DATABASE() AND table_name LIKE 'zz_deprecated_%';
        expected: "0"
